services:
  hermes-chat:
    image: ghcr.io/jackson7705/hermes-chat-bot-seo:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      # Internal Docker-network call to the Hermes API Server — no public TLS
      # needed because the chat-bot container is on hermes's bridge network.
      HERMES_URL: http://hermes-agent-p6xk-hermes-agent-1:8642/v1
      HERMES_MODEL: hermes-agent
      # Omni corpus (read-only) + users DB (writable)
      OMNI_ROOT: /opt/omni
      USERS_DB_PATH: /data/users.db
      KANBAN_DB_PATH: /opt/kanban/boards/approvals/kanban.db
      HERMES_CONTAINER: hermes-agent-p6xk-hermes-agent-1
      KANBAN_BOARD: approvals
      NEXTAUTH_URL: https://hermes-chat.srv1709148.hstgr.cloud
    volumes:
      # Omni corpus mirrored from the Hermes container's deploy-key clone
      - /docker/hermes-agent-p6xk/data/omni:/opt/omni:ro
      # Hermes kanban (SQLite per-board). NOT :ro — SQLite needs to touch
      # WAL/SHM files in the same dir even on readonly opens. Server code
      # is SELECT-only.
      - /docker/hermes-agent-p6xk/data/kanban:/opt/kanban
      # Docker socket for `docker exec hermes kanban …` server actions
      - /var/run/docker.sock:/var/run/docker.sock
      # Local users.db lives here on the host
      - ./data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.hermes-chat.rule=Host(`hermes-chat.srv1709148.hstgr.cloud`)
      - traefik.http.routers.hermes-chat.entrypoints=websecure
      - traefik.http.routers.hermes-chat.tls.certresolver=letsencrypt
      - traefik.http.services.hermes-chat.loadbalancer.server.port=3000
    networks:
      # Hermes Agent's compose network — chat-bot joins it so the proxy
      # route can reach the API server by container name.
      - hermes-net
      - default

networks:
  hermes-net:
    external: true
    name: hermes-agent-p6xk_default
  default:
    name: hermes-chat_default
